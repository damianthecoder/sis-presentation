<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIS Ladder — Reliability Animation</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; overflow: hidden; }
  #root { position: fixed; inset: 0; }
  .suite-nav {
    position: fixed;
    top: 18px;
    left: 18px;
    z-index: 2147483500;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #f3f3ee;
    text-decoration: none;
    border: 1px solid #3a3d35;
    background: rgba(10,11,10,0.88);
    padding: 10px 12px;
  }
  .suite-nav:hover { border-color: #b8ff2b; color: #b8ff2b; }
  .suite-nav:focus-visible { outline: 3px solid #b8ff2b; outline-offset: 3px; }
  /* Static fallback shown only when the React pipeline fails to load */
  #fallback {
    position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 24px;
    background: #0a0b0a; color: #f3f3ee;
    font-family: 'Inter', sans-serif;
  }
  #fallback.visible { display: flex; }
  #fallback img { max-width: 86%; max-height: 70vh; opacity: 0.92; }
  #fallback .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; letter-spacing: 0.18em;
    color: #ff6a1f; text-transform: uppercase;
  }
  #fallback .caption {
    font-size: 16px; color: #d0cec4; max-width: 720px; text-align: center; line-height: 1.5;
  }
</style>
<script>
  // Track whether any local script errored. If so, show the static fallback
  // instead of leaving the page blank.
  window.__sisBundleFailed = false;
  function sisBundleFail() { window.__sisBundleFailed = true; }
</script>
<script src="react.production.min.js" onerror="sisBundleFail()"></script>
<script src="react-dom.production.min.js" onerror="sisBundleFail()"></script>
</head>
<body>
<a class="suite-nav" href="index.html">Back to suite</a>
<div id="root"></div>

<div id="fallback" role="img" aria-label="SIS ladder — static preview (live animation unavailable)">
  <div class="tag">Live animation unavailable · static preview</div>
  <img src="check-v3-waterfall.jpg" alt="SIS ladder — cancellation waterfall reference frame">
  <div class="caption">
    The animated reliability ladder couldn't load (local bundle failed). Shown is the reference waterfall frame from the Shift Structure deck. See <strong>pyramid-scene.jsx</strong> + <strong>sim-data.jsx</strong> in the project folder for the full 24‑gamer sample simulation.
  </div>
</div>

<script src="ladder-bundle.js" onerror="sisBundleFail()"></script>

<script>
  // After 5 s, if React never materialized (or an onerror flagged), show the
  // fallback frame so the slot never goes blank live on stage.
  (function () {
    function check() {
      var rootEmpty = !document.getElementById('root').firstChild;
      if (window.__sisBundleFailed || !window.React || !window.ReactDOM || rootEmpty) {
        document.getElementById('fallback').classList.add('visible');
        document.getElementById('root').style.display = 'none';
      }
    }
    setTimeout(check, 5000);
  })();
</script>
</body>
</html>
