<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SIS Ladder — 4-Week Animation</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; overflow: hidden; }
  #root { position: fixed; inset: 0; }
  /* Static fallback shown only when the React pipeline fails to load */
  #fallback {
    position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 24px;
    background: #0a0b0a; color: #f3f3ee;
    font-family: 'Inter', sans-serif;
  }
  #fallback.visible { display: flex; }
  #fallback img { max-width: 86%; max-height: 70vh; opacity: 0.92; }
  #fallback .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; letter-spacing: 0.18em;
    color: #ff6a1f; text-transform: uppercase;
  }
  #fallback .caption {
    font-size: 16px; color: #d0cec4; max-width: 720px; text-align: center; line-height: 1.5;
  }
</style>
<script>
  // Track whether any CDN script errored. If so, show the static fallback
  // instead of leaving the page blank.
  window.__sisCdnFailed = false;
  function sisCdnFail() { window.__sisCdnFailed = true; }
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous" onerror="sisCdnFail()"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous" onerror="sisCdnFail()"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous" onerror="sisCdnFail()"></script>
</head>
<body>
<div id="root"></div>

<div id="fallback" role="img" aria-label="SIS ladder — static preview (live animation unavailable)">
  <div class="tag">Live animation unavailable · static preview</div>
  <img src="check-v3-waterfall.jpg" alt="SIS ladder — cancellation waterfall reference frame">
  <div class="caption">
    The animated 4‑week ladder couldn't load (CDN scripts failed). Shown is the reference waterfall frame from the Shift Structure deck. See <strong>pyramid-scene.jsx</strong> + <strong>sim-data.jsx</strong> in the project folder for the full 24‑gamer / 28‑shift simulation.
  </div>
</div>

<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="sim-data.jsx"></script>
<script type="text/babel" src="pyramid-scene.jsx"></script>
<script type="text/babel">
  function App() {
    return (
      <Stage width={1600} height={900} duration={TOTAL} background="#0a0b0a" persistKey="sis-ladder-anim">
        <PyramidScene />
      </Stage>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
  // After 5 s, if React never materialized (or an onerror flagged), show the
  // fallback frame so the slot never goes blank live on stage.
  (function () {
    function check() {
      var rootEmpty = !document.getElementById('root').firstChild;
      if (window.__sisCdnFailed || !window.React || !window.ReactDOM || rootEmpty) {
        document.getElementById('fallback').classList.add('visible');
        document.getElementById('root').style.display = 'none';
      }
    }
    setTimeout(check, 5000);
  })();
</script>
</body>
</html>
